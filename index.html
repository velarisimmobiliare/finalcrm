// ─── SUPABASE DATA LAYER (plain fetch — no library needed) ────────────────────
const db = {
  async getAll(table) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?order=id`, { headers: SB_HEADERS });
      if (!res.ok) { console.error(`Eroare citire ${table}:`, await res.text()); return null; }
      return await res.json();
    } catch(e) { console.error(e); return null; }
  },
  async upsert(table, row) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method: "POST",
        headers: { ...SB_HEADERS, "Prefer": "resolution=merge-duplicates,return=representation" },
        body: JSON.stringify(row)
      });
      if (!res.ok) {
        const err = await res.text();
        console.error(`Eroare salvare ${table}:`, err);
        return { error: err };
      }
      const data = await res.json();
      return Array.isArray(data) ? data[0] : data;
    } catch(e) { console.error(e); return null; }
  },
  async remove(table, id) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
        method: "DELETE",
        headers: SB_HEADERS
      });
      return res.ok;
    } catch(e) { console.error(e); return false; }
  }
};

// Serialize array fields and convert empty strings to null for numeric fields

  const r = { ...row };
  if (Array.isArray(r.activitati)) r.activitati = JSON.stringify(r.activitati);
  if (Array.isArray(r.utilitati)) r.utilitati = JSON.stringify(r.utilitati);
  if (Array.isArray(r.parcele)) r.parcele = JSON.stringify(r.parcele);
  // Convert empty strings to null for all fields (Supabase rejects "" for numeric columns)
  Object.keys(r).forEach(k => {
    if (r[k] === "" || r[k] === undefined) r[k] = null;
  });
  return r;
};
const fromDb = (row) => {
  const r = { ...row };

};

  useEffect(() => {
    (async () => {
      setLoading(true);
      const [l, p, v, c, r] = await Promise.all([
        db.getAll("leads"),
        db.getAll("parcele"),
        db.getAll("vizionari"),
        db.getAll("contracte"),
        db.getAll("remindere"),

      if (l) setLeadsState(l.map(fromDb));
      if (p) setParcelState(p.map(fromDb));
      if (v) setVizionariState(v.map(fromDb));
      if (c) setContracteState(c.map(fromDb));

      setLoading(false);

      next.forEach(x => {
        const old = prev.find(p => p.id === x.id);
        if (!old || JSON.stringify(old) !== JSON.stringify(x))
          db.upsert("leads", toDb(x)).then(r => {
            if (r && !r.error) showSync("✅ Salvat în cloud");

      });
      return next;
    });
